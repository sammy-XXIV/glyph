<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #050510;
  font-family: 'DM Sans', sans-serif;
  overflow-x: hidden;
  padding: 100px 24px 60px;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 40% at 20% 30%, rgba(0,40,180,0.18) 0%, transparent 70%),
    radial-gradient(ellipse 50% 40% at 80% 70%, rgba(120,0,180,0.12) 0%, transparent 70%);
  pointer-events: none;
}

.section { position: relative; z-index: 1; max-width: 1400px; margin: 0 auto 60px; }

.section-header {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 28px;
}

.section-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px;
  letter-spacing: 6px;
}
.section-title.legendary { color: #FFD700; }
.section-title.epic       { color: #c084fc; }
.section-title.rare       { color: #4d9fff; }
.section-title.uncommon   { color: #4ade80; }
.section-title.common     { color: #94a3b8; }

.section-line { flex: 1; height: 1px; }
.section-line.legendary { background: linear-gradient(90deg, rgba(255,215,0,0.4), transparent); }
.section-line.epic       { background: linear-gradient(90deg, rgba(192,132,252,0.4), transparent); }
.section-line.rare       { background: linear-gradient(90deg, rgba(77,159,255,0.4), transparent); }
.section-line.uncommon   { background: linear-gradient(90deg, rgba(74,222,128,0.4), transparent); }
.section-line.common     { background: linear-gradient(90deg, rgba(148,163,184,0.4), transparent); }

.section-count {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 2px;
  padding: 3px 10px;
  border-radius: 20px;
}
.section-count.legendary { color: #FFD700; background: rgba(255,215,0,0.1);  border: 1px solid rgba(255,215,0,0.3); }
.section-count.epic       { color: #c084fc; background: rgba(192,132,252,0.1); border: 1px solid rgba(192,132,252,0.3); }
.section-count.rare       { color: #4d9fff; background: rgba(77,159,255,0.1);  border: 1px solid rgba(77,159,255,0.3); }
.section-count.uncommon   { color: #4ade80; background: rgba(74,222,128,0.1);  border: 1px solid rgba(74,222,128,0.3); }
.section-count.common     { color: #94a3b8; background: rgba(148,163,184,0.1); border: 1px solid rgba(148,163,184,0.3); }

.grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 24px;
}

.card-float svg { width: 100%; height: auto; display: block; overflow: visible; }

.card-float.legendary { animation: floatLeg  4s ease-in-out infinite; }
.card-float.epic       { animation: floatEpic 5s ease-in-out infinite; }
.card-float.rare       { animation: floatRare 6s ease-in-out infinite; }
.card-float.uncommon   { animation: floatUnco 7s ease-in-out infinite; }
.card-float.common     { animation: floatComm 8s ease-in-out infinite; }

@keyframes floatLeg  { 0%,100% { transform: translateY(0) rotate(-0.8deg); } 50% { transform: translateY(-14px) rotate(0.8deg); } }
@keyframes floatEpic { 0%,100% { transform: translateY(0); }               50% { transform: translateY(-8px); } }
@keyframes floatRare { 0%,100% { transform: translateY(0) rotate(0.3deg);  } 50% { transform: translateY(-5px) rotate(-0.3deg); } }
@keyframes floatUnco { 0%,100% { transform: translateY(0); }               50% { transform: translateY(-3px); } }
@keyframes floatComm { 0%,100% { transform: translateY(0); }               50% { transform: translateY(-2px); } }

@media (max-width: 1100px) { .grid { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 750px)  { .grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 480px)  { .grid { grid-template-columns: 1fr; } body { padding: 80px 14px 48px; } }

function particles(id, c) {
  let out = '<g clip-path="url(#clip-' + id + ')">';
  const solid = Math.ceil(c.pCount * 0.85);
  for (let i = 0; i < solid; i++) {
    const cx  = (20 + Math.random() * 460).toFixed(0);
    const cy  = (430 + Math.random() * 50).toFixed(0);
    const r   = (1 + Math.random() * 1.5).toFixed(1);
    const dur = (2 + Math.random() * 2.5).toFixed(1);
    const beg = (Math.random() * 7).toFixed(1);
    const dx  = ((Math.random() - 0.5) * 20).toFixed(0);
    const dy  = (80 + Math.random() * 60).toFixed(0);
    const op  = (0.5 + Math.random() * 0.5).toFixed(2);
    const col = c.pColors[Math.floor(Math.random() * c.pColors.length)];
    out += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${col}" opacity="0"><animate attributeName="opacity" values="0;${op};0" dur="${dur}s" begin="${beg}s" repeatCount="indefinite"/><animateTransform attributeName="transform" type="translate" values="0,0;${dx},-${dy}" dur="${dur}s" begin="${beg}s" repeatCount="indefinite"/></circle>`;
  }
  const rings = c.pCount - solid;
  for (let i = 0; i < rings; i++) {
    const cx  = (50 + Math.random() * 400).toFixed(0);
    const cy  = (435 + Math.random() * 30).toFixed(0);
    const r   = (2 + Math.random() * 1.5).toFixed(1);
    const dur = (3.5 + Math.random() * 2).toFixed(1);
    const beg = (Math.random() * 7).toFixed(1);
    const dx  = ((Math.random() - 0.5) * 20).toFixed(0);
    const dy  = (90 + Math.random() * 50).toFixed(0);
    out += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${c.pColors[0]}" stroke-width="0.7" opacity="0"><animate attributeName="opacity" values="0;0.35;0" dur="${dur}s" begin="${beg}s" repeatCount="indefinite"/><animateTransform attributeName="transform" type="translate" values="0,0;${dx},-${dy}" dur="${dur}s" begin="${beg}s" repeatCount="indefinite"/></circle>`;
  }
  return out + '</g>';
}

<rect x="16" y="390" width="468" height="8" rx="0" fill="rgba(255,255,255,0.07)" stroke="${c.trackStroke}" stroke-width="1"/>
<line x1="133" y1="390" x2="133" y2="398" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

}

(function render() {
  const grids = { LEGENDARY: 'grid-legendary', EPIC: 'grid-epic', RARE: 'grid-rare', UNCOMMON: 'grid-uncommon', COMMON: 'grid-common' };
  CARDS.forEach(card => {
    const wrap = document.createElement('div');
    wrap.className = 'card-float ' + card.tier.toLowerCase();
    wrap.innerHTML = makeSVG(card);
    document.getElementById(grids[card.tier]).appendChild(wrap);
  });
})();
</script>
