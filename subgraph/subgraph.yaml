specVersion: 0.0.5
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: Glyph
    network: xlayer-sepolia
    source:
      address: "0x8DaFD7678Dc6bdc66a82dA50D541c4895757e362"
      abi: Glyph
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Player
        - Match
        - Prediction
        - PrizeClaim
      abis:
        - name: Glyph
          file: ./abis/Glyph.json
      eventHandlers:
        - event: Minted(indexed address,uint256,uint8,uint8)
          handler: handleMinted
        - event: Upgraded(indexed address,uint256,uint256,uint8)
          handler: handleUpgraded
        - event: Predicted(indexed address,uint256,uint8)
          handler: handlePredicted
        - event: PickScored(indexed address,uint256,bool)
          handler: handlePickScored
        - event: PrizeClaimed(indexed address,uint256)
          handler: handlePrizeClaimed
      file: ./src/mapping.ts
