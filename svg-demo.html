<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GLYPH — SVG Card Demo</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #050510;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  padding: 40px 20px;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 40% at 20% 30%, rgba(0,40,180,0.18) 0%, transparent 70%),
    radial-gradient(ellipse 50% 40% at 80% 70%, rgba(120,0,180,0.12) 0%, transparent 70%);
  pointer-events: none;
}
p {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: rgba(255,255,255,0.2);
  letter-spacing: 2px;
  position: relative;
}
.card-float {
  position: relative;
  animation: floatLeg 4s ease-in-out infinite;
}
@keyframes floatLeg {
  0%, 100% { transform: translateY(0) rotate(-0.8deg); }
  50%       { transform: translateY(-14px) rotate(0.8deg); }
}
</style>
</head>
<body>

<div class="card-float">
<!--
  1:1 square card — 500 × 500
  Jersey fills entire card.
  Info overlaid via bottom gradient.
  Sharp corners throughout (rx="0").
-->
<svg width="340" height="340" viewBox="0 0 500 500"
     xmlns="http://www.w3.org/2000/svg"
     overflow="visible">
<defs>

  <!-- Full card clip — SHARP CORNERS -->
  <clipPath id="clip-card">
    <rect x="0" y="0" width="500" height="500"/>
  </clipPath>

  <!-- Shimmer at 115deg matching index.html -->
  <linearGradient id="shimmer"
                  gradientUnits="userSpaceOnUse"
                  x1="-250" y1="500" x2="250" y2="0">
    <stop offset="0%"   stop-color="rgba(255,215,0,0)"/>
    <stop offset="25%"  stop-color="rgba(255,215,0,0)"/>
    <stop offset="44%"  stop-color="rgba(255,215,0,0.22)"/>
    <stop offset="50%"  stop-color="rgba(255,255,180,0.55)"/>
    <stop offset="56%"  stop-color="rgba(255,215,0,0.22)"/>
    <stop offset="75%"  stop-color="rgba(255,215,0,0)"/>
    <stop offset="100%" stop-color="rgba(255,215,0,0)"/>
    <animateTransform attributeName="gradientTransform"
                      type="translate"
                      values="750,0;-750,0"
                      dur="1.8s"
                      repeatCount="indefinite"/>
  </linearGradient>

  <!-- Bottom overlay: dark gradient over jersey for info readability -->
  <linearGradient id="overlay-grad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"   stop-color="rgba(5,5,16,0)"/>
    <stop offset="45%"  stop-color="rgba(5,5,16,0.72)"/>
    <stop offset="100%" stop-color="rgba(5,5,16,0.97)"/>
  </linearGradient>

  <!-- Progress bar fill -->
  <linearGradient id="prog-fill" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%"   stop-color="#cc9900"/>
    <stop offset="70%"  stop-color="#FFD700"/>
    <stop offset="100%" stop-color="#fff5a0"/>
  </linearGradient>

  <!-- Outer glow filter — extends well beyond card edges -->
  <filter id="border-glow" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur in="SourceGraphic" result="blur">
      <animate attributeName="stdDeviation" values="10;22;10" dur="2.5s" repeatCount="indefinite"/>
    </feGaussianBlur>
  </filter>
  <!-- Second softer spread layer -->
  <filter id="outer-spread" x="-60%" y="-60%" width="220%" height="220%">
    <feGaussianBlur in="SourceGraphic" result="blur">
      <animate attributeName="stdDeviation" values="18;36;18" dur="2.5s" repeatCount="indefinite"/>
    </feGaussianBlur>
  </filter>

  <!-- Progress tip glow -->
  <filter id="tip-glow" x="-120%" y="-120%" width="340%" height="340%">
    <feGaussianBlur stdDeviation="3" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>

</defs>

<!-- ══════════════════════════ -->
<!--  JERSEY — full bleed 1:1  -->
<!-- ══════════════════════════ -->
<image href="player.jpg"
       x="0" y="0" width="500" height="500"
       preserveAspectRatio="xMidYMid slice"
       clip-path="url(#clip-card)"/>

<!-- ══════════════════════════ -->
<!--  SHIMMER                   -->
<!-- ══════════════════════════ -->
<rect x="0" y="0" width="500" height="500"
      fill="url(#shimmer)"
      clip-path="url(#clip-card)"/>

<!-- ══════════════════════════ -->
<!--  PARTICLES                 -->
<!-- ══════════════════════════ -->
<g clip-path="url(#clip-card)">

  <circle cx="45"  cy="440" r="1.5" fill="#FFD700" opacity="0">
    <animate attributeName="opacity" values="0;1;0.8;0" dur="3.2s" begin="0s"   repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0,0;6,-120"  dur="3.2s" begin="0s"   repeatCount="indefinite"/>
  </circle>
  <circle cx="108" cy="455" r="1.2" fill="#FFD700" opacity="0">
    <animate attributeName="opacity" values="0;0.7;0" dur="2.6s" begin="0.5s"  repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0,0;-9,-105" dur="2.6s" begin="0.5s"  repeatCount="indefinite"/>
  </circle>
  <circle cx="185" cy="445" r="1.8" fill="#FFE55C" opacity="0">
    <animate attributeName="opacity" values="0;1;0.9;0" dur="3.7s" begin="1.0s"  repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0,0;4,-130"  dur="3.7s" begin="1.0s"  repeatCount="indefinite"/>
  </circle>
  <circle cx="258" cy="460" r="1.3" fill="#FFD700" opacity="0">
    <animate attributeName="opacity" values="0;0.8;0" dur="2.4s" begin="1.7s"  repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0,0;-7,-98"  dur="2.4s" begin="1.7s"  repeatCount="indefinite"/>
  </circle>
  <circle cx="332" cy="448" r="1.6" fill="#FFD700" opacity="0">
    <animate attributeName="opacity" values="0;0.85;0" dur="3.0s" begin="0.3s"  repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0,0;8,-122"  dur="3.0s" begin="0.3s"  repeatCount="indefinite"/>
  </circle>
  <circle cx="404" cy="453" r="1.4" fill="#FFD700" opacity="0">
    <animate attributeName="opacity" values="0;0.65;0" dur="2.2s" begin="2.3s"  repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0,0;-5,-92"  dur="2.2s" begin="2.3s"  repeatCount="indefinite"/>
  </circle>
  <circle cx="460" cy="442" r="1.7" fill="#FFE55C" opacity="0">
    <animate attributeName="opacity" values="0;0.75;0" dur="3.5s" begin="0.8s"  repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0,0;10,-125" dur="3.5s" begin="0.8s"  repeatCount="indefinite"/>
  </circle>
  <circle cx="75"  cy="463" r="1.1" fill="#FFD700" opacity="0">
    <animate attributeName="opacity" values="0;0.55;0" dur="2.8s" begin="3.2s"  repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0,0;12,-108" dur="2.8s" begin="3.2s"  repeatCount="indefinite"/>
  </circle>
  <circle cx="218" cy="458" r="1.5" fill="#FFD700" opacity="0">
    <animate attributeName="opacity" values="0;0.8;0" dur="3.1s" begin="4.0s"  repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0,0;-4,-118" dur="3.1s" begin="4.0s"  repeatCount="indefinite"/>
  </circle>
  <circle cx="373" cy="458" r="1.2" fill="#FFD700" opacity="0">
    <animate attributeName="opacity" values="0;0.6;0" dur="2.5s" begin="5.0s"  repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0,0;6,-100"  dur="2.5s" begin="5.0s"  repeatCount="indefinite"/>
  </circle>
  <circle cx="145" cy="465" r="1.0" fill="#FFE55C" opacity="0">
    <animate attributeName="opacity" values="0;0.5;0" dur="4.1s" begin="2.7s"  repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0,0;-10,-135" dur="4.1s" begin="2.7s"  repeatCount="indefinite"/>
  </circle>
  <circle cx="487" cy="460" r="1.4" fill="#FFD700" opacity="0">
    <animate attributeName="opacity" values="0;0.7;0" dur="2.9s" begin="1.5s"  repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0,0;-8,-110"  dur="2.9s" begin="1.5s"  repeatCount="indefinite"/>
  </circle>
  <circle cx="298" cy="464" r="1.0" fill="#FFD700" opacity="0">
    <animate attributeName="opacity" values="0;0.55;0" dur="2.1s" begin="3.7s"  repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0,0;3,-88"   dur="2.1s" begin="3.7s"  repeatCount="indefinite"/>
  </circle>
  <circle cx="20"  cy="458" r="1.6" fill="#FFE55C" opacity="0">
    <animate attributeName="opacity" values="0;0.7;0" dur="3.4s" begin="6.1s"  repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0,0;15,-115"  dur="3.4s" begin="6.1s"  repeatCount="indefinite"/>
  </circle>
  <circle cx="428" cy="450" r="1.1" fill="#FFD700" opacity="0">
    <animate attributeName="opacity" values="0;0.5;0" dur="2.7s" begin="6.9s"  repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0,0;-8,-96"   dur="2.7s" begin="6.9s"  repeatCount="indefinite"/>
  </circle>
  <!-- hollow rings -->
  <circle cx="162" cy="448" r="3" fill="none" stroke="#FFD700" stroke-width="0.7" opacity="0">
    <animate attributeName="opacity" values="0;0.35;0" dur="5s" begin="2s"   repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0,0;5,-128" dur="5s" begin="2s"   repeatCount="indefinite"/>
  </circle>
  <circle cx="340" cy="455" r="2.5" fill="none" stroke="#FFE55C" stroke-width="0.7" opacity="0">
    <animate attributeName="opacity" values="0;0.3;0" dur="4.4s" begin="5.4s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0,0;-6,-118" dur="4.4s" begin="5.4s" repeatCount="indefinite"/>
  </circle>

</g>

<!-- ══════════════════════════ -->
<!--  BOTTOM OVERLAY            -->
<!-- ══════════════════════════ -->
<rect x="0" y="270" width="500" height="230"
      fill="url(#overlay-grad)"
      clip-path="url(#clip-card)"/>

<!-- Card name -->
<text x="16" y="356"
      font-family="'Bebas Neue',sans-serif" font-size="38"
      fill="#ffffff" letter-spacing="2">FRANCE</text>

<!-- divider -->
<line x1="16" y1="368" x2="484" y2="368"
      stroke="rgba(255,215,0,0.15)" stroke-width="1"/>

<!-- Progress label -->
<text x="16"  y="384"
      font-family="'DM Mono',monospace" font-size="8"
      fill="rgba(255,255,255,0.6)" letter-spacing="2">PREDICTION SCORE</text>
<text x="484" y="384"
      font-family="'DM Mono',monospace" font-size="8"
      fill="#FFD700" text-anchor="end">65 / 100</text>

<!-- Track -->
<rect x="16" y="390" width="468" height="8" rx="0"
      fill="rgba(255,255,255,0.07)"
      stroke="rgba(255,215,0,0.2)" stroke-width="1"/>

<!-- Tick marks -->
<line x1="133" y1="390" x2="133" y2="398" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
<line x1="250" y1="390" x2="250" y2="398" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
<line x1="367" y1="390" x2="367" y2="398" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

<!-- Fill — 65% of 468 = 304px -->
<rect x="16" y="390" width="0" height="8" rx="0" fill="url(#prog-fill)">
  <animate attributeName="width"
           values="0;304" dur="1.5s" begin="0.3s"
           fill="freeze" calcMode="spline"
           keyTimes="0;1" keySplines="0.4 0 0.2 1"/>
</rect>

<!-- Glowing tip -->
<circle cx="16" cy="394" r="5.5" fill="#FFD700" filter="url(#tip-glow)">
  <animate attributeName="cx"
           values="16;320" dur="1.5s" begin="0.3s"
           fill="freeze" calcMode="spline"
           keyTimes="0;1" keySplines="0.4 0 0.2 1"/>
</circle>

<!-- Tier labels under bar -->
<text x="16"  y="412" font-family="'DM Mono',monospace" font-size="7"
      fill="rgba(255,255,255,0.4)" letter-spacing="1">ROOKIE</text>
<text x="250" y="412" font-family="'DM Mono',monospace" font-size="7"
      fill="#FFD700" text-anchor="middle" letter-spacing="1">★ ANALYST</text>
<text x="484" y="412" font-family="'DM Mono',monospace" font-size="7"
      fill="rgba(255,255,255,0.4)" text-anchor="end" letter-spacing="1">ORACLE</text>

<!-- Metadata — only WC WINS + TEAM OVR, no quotes -->
<line x1="16" y1="424" x2="484" y2="424"
      stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

<text x="16"  y="440" font-family="'DM Mono',monospace" font-size="8"
      fill="rgba(255,255,255,0.55)" letter-spacing="1">FIFA WC WINS</text>
<text x="16"  y="456" font-family="'Bebas Neue',monospace" font-size="20" fill="#FFD700">2</text>

<text x="484" y="440" font-family="'DM Mono',monospace" font-size="8"
      fill="rgba(255,255,255,0.55)" letter-spacing="1" text-anchor="end">TEAM OVR</text>
<text x="484" y="456" font-family="'Bebas Neue',monospace" font-size="20"
      fill="#4d9fff" text-anchor="end">91</text>

<text x="484" y="492" font-family="'DM Mono',monospace" font-size="6.5"
      fill="rgba(255,255,255,0.18)" text-anchor="end" letter-spacing="1">ERC-721 · #0001</text>

<!-- ══════════════════════════ -->
<!--  OVERLAY CHIPS top-right   -->
<!-- ══════════════════════════ -->
<rect x="374" y="12" width="112" height="18" rx="4"
      fill="rgba(0,0,0,0.65)" stroke="rgba(255,215,0,0.4)" stroke-width="1"/>
<text x="430" y="25"
      font-family="'DM Mono',monospace" font-size="8.5"
      fill="#FFD700" text-anchor="middle" letter-spacing="2">LEGENDARY</text>

<rect x="388" y="36" width="98" height="18" rx="4"
      fill="rgba(0,0,0,0.6)"/>
<text x="437" y="49"
      font-family="'DM Sans',sans-serif" font-size="10" font-weight="600"
      fill="#ffffff" text-anchor="middle">France 🇫🇷</text>

<!-- ══════════════════════════ -->
<!--  SHARP-CORNERED GOLD BORDER + WALLET GLOW -->
<!-- ══════════════════════════ -->
<!-- Wide outer spread — the big ambient glow around the card -->
<rect x="1" y="1" width="498" height="498" rx="0" fill="none"
      stroke="rgba(255,180,0,0.45)" stroke-width="8"
      filter="url(#outer-spread)">
  <animate attributeName="stroke-opacity" values="0.3;0.55;0.3" dur="2.5s" repeatCount="indefinite"/>
</rect>
<!-- Tighter glow layer -->
<rect x="1" y="1" width="498" height="498" rx="0" fill="none"
      stroke="rgba(255,215,0,0.9)" stroke-width="4"
      filter="url(#border-glow)">
  <animate attributeName="stroke-opacity" values="0.65;1;0.65" dur="2.5s" repeatCount="indefinite"/>
</rect>
<!-- Crisp border on top — rx="0" -->
<rect x="1" y="1" width="498" height="498" rx="0" fill="none"
      stroke="rgba(255,215,0,0.95)" stroke-width="2">
  <animate attributeName="stroke-opacity" values="0.75;1;0.75" dur="2.5s" repeatCount="indefinite"/>
</rect>

</svg>
</div>

<p>1:1 · SHARP BORDER · PURE SVG · WALLET READY</p>

</body>
</html>
