<title>GLYPH — Predictions</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100vw; min-height: 100vh;
  background: #050510;
  font-family: 'DM Sans', sans-serif;
  color: #fff; overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 60% 40% at 10% 20%, rgba(0,40,180,0.13) 0%, transparent 70%),
    radial-gradient(ellipse 50% 40% at 90% 80%, rgba(120,0,180,0.09) 0%, transparent 70%);
  pointer-events: none; z-index: 0;
}
.page {
  position: relative; z-index: 1;
  max-width: 860px; margin: 0 auto;
  padding: 100px 24px 80px;
}

/* ── Page header ───────────────────────────────────────────── */
.page-header {
  margin-bottom: 32px;
}
.page-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 36px; letter-spacing: 6px; color: #fff;
}
.page-sub {
  font-family: 'DM Mono', monospace;
  font-size: 9px; letter-spacing: 3px;
  color: rgba(255,255,255,0.25); margin-top: 4px;
}

/* ── Slot navigation dots ──────────────────────────────────── */
.slot-dots {
  display: flex; align-items: center; justify-content: center;
  gap: 6px; margin-bottom: 28px; flex-wrap: wrap;
}
.slot-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: rgba(255,255,255,0.12);
  cursor: pointer; transition: all 0.2s;
  border: 1px solid transparent;
}
.slot-dot:hover { background: rgba(255,255,255,0.3); }
.slot-dot.active {
  background: #fff; width: 24px; border-radius: 4px;
}
.slot-dot.past { background: rgba(255,255,255,0.08); }
.slot-dot.has-pick { background: rgba(74,222,128,0.5); }
.slot-dot.has-pick.active { background: #4ade80; }

/* ── Slot viewer ───────────────────────────────────────────── */
.slot-viewer {
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 20px;
  padding: 28px;
  margin-bottom: 20px;
  min-height: 320px;
}
.slot-header {
  display: flex; align-items: flex-start; justify-content: space-between;
  margin-bottom: 24px; gap: 12px;
}
.slot-meta { flex: 1; }
.slot-label {
  font-family: 'DM Mono', monospace;
  font-size: 9px; letter-spacing: 4px;
  color: rgba(255,255,255,0.3);
  margin-bottom: 6px;
  display: flex; align-items: center; gap: 10px;
}
.simultaneous-badge {
  font-family: 'DM Mono', monospace;
  font-size: 7px; letter-spacing: 2px;
  color: #a78bfa; background: rgba(167,139,250,0.1);
  border: 1px solid rgba(167,139,250,0.25);
  padding: 2px 8px; border-radius: 6px;
}
.slot-time {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px; letter-spacing: 4px; color: #fff;
}
.slot-nav {
  display: flex; gap: 8px; align-items: center;
}
.nav-btn {
  width: 40px; height: 40px; border-radius: 50%;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.5);
  font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.18s;
}
.nav-btn:hover:not(:disabled) {
  background: rgba(255,255,255,0.1);
  color: #fff; border-color: rgba(255,255,255,0.25);
}
.nav-btn:disabled { opacity: 0.2; cursor: default; }

.status-pill {
  font-family: 'DM Mono', monospace;
  font-size: 8px; letter-spacing: 2px;
  padding: 4px 12px; border-radius: 10px;
  white-space: nowrap;
  margin-top: 4px; display: inline-block;
}
.status-pill.open    { color: #4ade80; background: rgba(74,222,128,0.1);  border: 1px solid rgba(74,222,128,0.25); }
.status-pill.locked  { color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); }
.status-pill.past    { color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); }
.status-pill.live    { color: #fb923c; background: rgba(251,146,60,0.1);  border: 1px solid rgba(251,146,60,0.3); }
.status-pill.upcoming{ color: rgba(255,255,255,0.4); background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); }

/* ── Match cards ───────────────────────────────────────────── */
.matches-container {
  display: grid;
  grid-template-columns: 1fr;
  gap: 14px;
}
.matches-container.dual {
  grid-template-columns: 1fr 1fr;
}
.match-card {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 14px;
  padding: 20px 20px;
  transition: border-color 0.2s;
  display: flex; flex-direction: column;
}
.match-card .teams-row { margin-bottom: 0; flex: 1; align-items: center; }
.match-card .picks-row,
.match-card .result-pick-row,
.match-card .tbd-notice { margin-top: 16px; }
.match-card:hover { border-color: rgba(255,255,255,0.12); }
.match-card.has-pick { border-color: rgba(74,222,128,0.2); }
.match-card.locked-card { opacity: 0.5; pointer-events: none; }
.match-card.result-card { border-color: rgba(255,255,255,0.05); }

.match-top {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 16px;
}
.match-stage-tag {
  font-family: 'DM Mono', monospace;
  font-size: 8px; letter-spacing: 2px;
  color: rgba(255,255,255,0.2);
}
.match-pick-pill {
  margin-left: auto;
  font-family: 'DM Mono', monospace;
  font-size: 8px; letter-spacing: 1px;
}
.match-pick-pill.correct { color: #4ade80; background: rgba(74,222,128,0.1); border: 1px solid rgba(74,222,128,0.25); padding: 2px 8px; border-radius: 8px; }
.match-pick-pill.wrong   { color: #f87171; background: rgba(248,113,113,0.08); border: 1px solid rgba(248,113,113,0.2); padding: 2px 8px; border-radius: 8px; }
.match-pick-pill.saved   { color: rgba(74,222,128,0.7); font-size: 9px; }

.teams-row {
  display: flex; align-items: center; gap: 0; margin-bottom: 16px;
}
.team {
  display: flex; align-items: center; gap: 10px; flex: 1;
}
.team.right { flex-direction: row-reverse; }
.team-flag { width: 36px; height: 27px; object-fit: cover; border-radius: 3px; display: block; }
.team-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 18px; letter-spacing: 2px; color: #fff;
}
.team.right .team-name { text-align: right; }
.vs-block { flex: 0 0 64px; text-align: center; }
.vs-text {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 12px; letter-spacing: 4px;
  color: rgba(255,255,255,0.12);
}
.result-score {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px; letter-spacing: 4px; color: #fff;
}

.picks-row { display: flex; gap: 6px; }
.pick-btn {
  flex: 1;
  font-family: 'DM Mono', monospace;
  font-size: 8px; letter-spacing: 1px;
  color: rgba(255,255,255,0.35);
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.07);
  padding: 9px 4px; border-radius: 7px;
  cursor: pointer; text-align: center;
  transition: all 0.15s;
}
.pick-btn:hover {
  color: #fff; background: rgba(255,255,255,0.08);
  border-color: rgba(255,255,255,0.18);
}
.pick-btn.sel-home, .pick-btn.sel-away {
  color: #fff; background: rgba(255,255,255,0.12);
  border-color: rgba(255,255,255,0.35);
}
.pick-btn.sel-draw {
  color: #94a3b8; background: rgba(148,163,184,0.1);
  border-color: rgba(148,163,184,0.35);
}
.pick-btn.correct-pick {
  color: #4ade80; background: rgba(74,222,128,0.08);
  border-color: rgba(74,222,128,0.3); pointer-events: none;
}
.pick-btn.wrong-pick {
  color: #f87171; background: rgba(248,113,113,0.06);
  border-color: rgba(248,113,113,0.2); pointer-events: none;
}
.pick-btn.neutral-pick { pointer-events: none; }

.tbd-notice {
  font-family: 'DM Mono', monospace;
  font-size: 8px; letter-spacing: 3px;
  color: rgba(255,255,255,0.15);
  text-align: center; padding: 10px 0;
}
.result-pick-row {
  font-family: 'DM Mono', monospace;
  font-size: 9px; letter-spacing: 2px;
  margin-top: 12px; padding: 8px 12px;
  border-radius: 8px; text-align: center;
}
.result-pick-row.correct { color: #4ade80; background: rgba(74,222,128,0.08); border: 1px solid rgba(74,222,128,0.2); }
.result-pick-row.wrong   { color: #f87171; background: rgba(248,113,113,0.06); border: 1px solid rgba(248,113,113,0.15); }

/* ── Submit bar ────────────────────────────────────────────── */
.submit-bar {
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(74,222,128,0.06);
  border: 1px solid rgba(74,222,128,0.15);
  border-radius: 14px; padding: 14px 20px;
  margin-bottom: 20px;
  display: none;
}
.submit-bar span {
  font-family: 'DM Mono', monospace;
  font-size: 9px; letter-spacing: 2px;
  color: rgba(74,222,128,0.7);
}
.submit-bar strong { color: #4ade80; }
.submit-btn {
  font-family: 'DM Mono', monospace;
  font-size: 10px; letter-spacing: 2px;
  color: #050510; background: #4ade80;
  border: none; padding: 0 22px; height: 38px;
  border-radius: 19px; cursor: pointer;
  transition: transform 0.15s, opacity 0.2s;
}
.submit-btn:hover { transform: scale(1.03); }
.submit-btn:active { transform: scale(0.97); }
.submit-btn:disabled { opacity: 0.5; cursor: default; }

/* ── Next match banner ─────────────────────────────────────── */
.next-up {
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 14px; padding: 18px 22px;
  display: flex; align-items: center; gap: 16px;
}
.next-up-label {
  font-family: 'DM Mono', monospace;
  font-size: 8px; letter-spacing: 3px;
  color: rgba(255,255,255,0.2);
  white-space: nowrap;
}
.next-up-teams {
  flex: 1;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 16px; letter-spacing: 3px;
  color: rgba(255,255,255,0.6);
}
.next-up-countdown {
  font-family: 'DM Mono', monospace;
  font-size: 13px; letter-spacing: 2px;
  color: #fff;
  white-space: nowrap;
}
.next-up-btn {
  font-family: 'DM Mono', monospace;
  font-size: 8px; letter-spacing: 2px;
  color: rgba(255,255,255,0.4);
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  padding: 6px 16px; border-radius: 8px;
  cursor: pointer; transition: all 0.18s;
  white-space: nowrap;
}
.next-up-btn:hover { color: #fff; background: rgba(255,255,255,0.1); }

/* ── Responsive ────────────────────────────────────────────── */
@media (max-width: 600px) {
  .page { padding: 80px 12px 80px; }
  .slot-viewer { padding: 18px 14px; }
  .matches-container.dual { grid-template-columns: 1fr; }
  .team-flag { font-size: 22px; }
  .team-name { font-size: 14px; letter-spacing: 1px; }
  .vs-block  { flex: 0 0 48px; }
  .pick-btn  { font-size: 7px; padding: 8px 2px; }
  .slot-time { font-size: 22px; }
  .next-up-teams { font-size: 13px; }
}

/* ── Live match featured ───────────────────────────────────── */
.live-match-viewer {
  border-color: rgba(251,146,60,0.3);
  background: rgba(251,146,60,0.03);
}
.won-card {
  border-color: rgba(74,222,128,0.35);
  background: rgba(74,222,128,0.05);
}
.lost-card {
  border-color: rgba(248,113,113,0.25);
  background: rgba(248,113,113,0.03);
}
.live-timer-wrap {
  text-align: center;
  margin: 20px 0 24px;
}
.live-phase-label {
  font-family: 'DM Mono', monospace;
  font-size: 8px; letter-spacing: 4px;
  color: rgba(251,146,60,0.7);
  margin-bottom: 8px;
}
.live-timer {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 52px; letter-spacing: 6px;
  color: #fff; line-height: 1;
}
.live-timer.urgent { color: #fb923c; }
.live-timer-sub {
  font-family: 'DM Mono', monospace;
  font-size: 8px; letter-spacing: 3px;
  color: rgba(255,255,255,0.25);
  margin-top: 6px;
}
.break-viewer {
  border-color: rgba(148,163,184,0.15);
  background: rgba(148,163,184,0.02);
}

/* ── Queue & history ───────────────────────────────────────── */
.section-label {
  font-family: 'DM Mono', monospace;
  font-size: 8px; letter-spacing: 4px;
  color: rgba(255,255,255,0.2);
  margin: 28px 0 12px;
}
.queue-item {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 18px;
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(255,255,255,0.05);
  border-radius: 12px;
  margin-bottom: 8px;
  opacity: 0.4;
}
.queue-teams {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 16px; letter-spacing: 3px;
  color: rgba(255,255,255,0.6); flex: 1;
}
.queue-group {
  font-family: 'DM Mono', monospace;
  font-size: 8px; letter-spacing: 2px;
  color: rgba(255,255,255,0.2);
}
.history-item {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 18px;
  border-radius: 12px;
  margin-bottom: 8px;
  border: 1px solid rgba(255,255,255,0.06);
  background: rgba(255,255,255,0.02);
  transition: border-color 0.3s, background 0.3s;
}
.history-item.correct {
  border-color: rgba(74,222,128,0.4);
  background: rgba(74,222,128,0.08);
}
.history-item.wrong {
  border-color: rgba(248,113,113,0.18);
  background: rgba(248,113,113,0.03);
}
.history-item.no-pick { opacity: 0.4; }
.history-teams {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 16px; letter-spacing: 2px;
  color: rgba(255,255,255,0.7); flex: 1;
}
.history-score {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 18px; letter-spacing: 3px; color: #fff;
  margin: 0 12px;
}
.history-verdict {
  font-family: 'DM Mono', monospace;
  font-size: 8px; letter-spacing: 2px;
  white-space: nowrap;
}
.history-item.correct .history-verdict { color: #4ade80; }
.history-item.wrong   .history-verdict { color: #f87171; }
.history-item.no-pick .history-verdict { color: rgba(255,255,255,0.2); }
.demo-idle {
  text-align: center; padding: 48px 24px;
  font-family: 'DM Mono', monospace;
  font-size: 9px; letter-spacing: 3px;
  color: rgba(255,255,255,0.2);
  border: 1px dashed rgba(255,255,255,0.07);
  border-radius: 16px;
  line-height: 2;
}

/* demo controls */
.demo-controls {
  display: flex; gap: 10px; margin-bottom: 20px;
}
.demo-btn {
  font-family: 'DM Mono', monospace;
  font-size: 9px; letter-spacing: 2px;
  border: none; padding: 0 20px; height: 36px;
  border-radius: 18px; cursor: pointer;
  transition: transform 0.15s, opacity 0.2s;
}
.demo-btn:disabled { opacity: 0.35; cursor: not-allowed; }
.demo-btn.start { background: #4ade80; color: #050510; }
.demo-btn.start:hover:not(:disabled) { transform: scale(1.03); }
.demo-btn.stop  { background: rgba(248,113,113,0.15); color: #f87171; border: 1px solid rgba(248,113,113,0.3); }
.demo-btn.stop:hover:not(:disabled)  { background: rgba(248,113,113,0.25); }
</style>

// ── State ─────────────────────────────────────────────────────────────────
const userPicks = {};
const pending   = {};
let demoState   = { phase:'idle', matchId:null, secondsLeft:0, nextMatchId:null, scored:[] };
let _walletAddr = null;
let _demoPaused = false;

const _CONTRACT = '0x9d7aC55b39A05A16d4409a841e652c906F209195';
function _picksKey()   { return _walletAddr ? 'glyph_picks_'   + _CONTRACT + '_' + _walletAddr : null; }
function _pendingKey() { return _walletAddr ? 'glyph_pending_' + _CONTRACT + '_' + _walletAddr : null; }

function savePicks() {
  const k = _picksKey(); if (!k) return;
  try { localStorage.setItem(k, JSON.stringify(userPicks)); } catch {}
}
function savePending() {
  const k = _pendingKey(); if (!k) return;
  try { localStorage.setItem(k, JSON.stringify(pending)); } catch {}
}
function loadFromStorage() {
  try {
    const p = JSON.parse(localStorage.getItem(_picksKey()) || '{}');
    Object.entries(p).forEach(([k, v]) => { userPicks[Number(k)] = v; });
  } catch {}
  try {
    const p = JSON.parse(localStorage.getItem(_pendingKey()) || '{}');
    Object.entries(p).forEach(([k, v]) => { pending[Number(k)] = v; });
  } catch {}
}

function getMatch(id) { return MATCHES.find(m => m.id === id); }
function fmt(s) { return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`; }

// ── Local tick — smooth 1-second countdown between server polls ────────────
setInterval(() => {
  if (!_demoPaused && demoState.secondsLeft > 0) {
    demoState.secondsLeft = Math.max(0, demoState.secondsLeft - 1);
    renderLive();
  }
}, 1000);

// ── Poll state.json ────────────────────────────────────────────────────────
async function pollState() {
  try {
    const r = await fetch(DEMO_SERVER + '/state.json?t=' + Date.now());
    if (r.ok) {
      const s = await r.json();
      if (s.ts && s.secondsLeft > 0) {
        const elapsed = Math.floor((Date.now() - s.ts) / 1000);
        s.secondsLeft = Math.max(0, s.secondsLeft - elapsed);
      }
      if (_demoPaused) s.secondsLeft = demoState.secondsLeft; // freeze timer when paused
      demoState = s;
    }
  } catch(_) {}
  render();
}

// ── Pick & submit ──────────────────────────────────────────────────────────
async function pick(matchId, choice) {
  // If match is currently live, auto-submit immediately — no button press needed
  if (demoState.phase === 'live' && demoState.matchId === matchId) {
    if (userPicks[matchId] || pending[matchId]) return; // already picked
    pending[matchId] = choice;
    savePending();
    updateSubmitBar();
    renderLive();
    await submitPicks();
    return;
  }
  if (pending[matchId] === choice) delete pending[matchId];
  else pending[matchId] = choice;
  savePending();
  updateSubmitBar();
  renderLive();
}

function updateSubmitBar() {
  const count = Object.keys(pending).length;
  document.getElementById('pending-count').textContent = count;
  document.getElementById('submit-bar').style.display = count > 0 ? 'flex' : 'none';
}

async function submitPicks() {
  const addr = await GLYPH.getWallet();
  if (!addr) { alert('Connect your wallet first.'); return; }
  console.log('[submit] wallet:', addr, 'pending:', JSON.stringify(pending));
  const btn = document.getElementById('submit-btn');
  btn.disabled = true; btn.textContent = 'SUBMITTING...';
  try {
    for (const [matchId, choice] of Object.entries(pending)) {
      console.log('[submit] sending predict matchId:', matchId, 'choice:', choice);
      await GLYPH.submitPrediction(Number(matchId), ['home','draw','away'].indexOf(choice));
      console.log('[submit] predict done for match', matchId);
    }
    Object.assign(userPicks, pending);
    Object.keys(pending).forEach(k => delete pending[k]);
    savePicks();
    savePending();
    updateSubmitBar();
    renderLive();
    btn.textContent = 'SAVED ✓';
    setTimeout(() => { btn.textContent = 'SUBMIT PICKS'; btn.disabled = false; }, 2500);
  } catch(e) {
    btn.textContent = 'SUBMIT PICKS'; btn.disabled = false;
    alert('Submit failed: ' + (e.reason || e.message));
  }
}

// ── Render live match ──────────────────────────────────────────────────────
function renderLive() {
  const el = document.getElementById('live-section');
  const { phase, matchId, secondsLeft, nextMatchId } = demoState;

  if (!phase || phase === 'idle' || phase === 'done') {
    el.innerHTML = `<div class="demo-idle">DEMO NOT RUNNING<br>RUN node demo.js score TO START</div>`;
    return;
  }

  if (phase === 'break') {
    const next = getMatch(nextMatchId);
    el.innerHTML = `<div class="slot-viewer break-viewer">
      <div class="match-top"><span class="status-pill upcoming">BREAK</span></div>
      <div class="live-timer-wrap">
        <div class="live-phase-label">NEXT MATCH IN</div>
        <div class="live-timer ${secondsLeft < 30 ? 'urgent' : ''}">${fmt(secondsLeft)}</div>
        ${next ? `<div class="live-timer-sub">${next.home.toUpperCase()} VS ${next.away.toUpperCase()} · ${next.group}</div>` : ''}
      </div>
    </div>`;
    return;
  }

  const m = getMatch(matchId);
  if (!m) { el.innerHTML = ''; return; }

  const myPick   = pending[m.id] || userPicks[m.id] || null;
  const isScored = phase === 'scored';
  const scored   = demoState.scored?.find(s => s.matchId === m.id);
  const winner   = scored ? ['home','draw','away'][scored.result] : null;
  const correct  = isScored && myPick && myPick === winner;
  const wrong    = isScored && myPick && myPick !== winner;

  const pickBtnCls = (type) => {
    if (!myPick) return 'pick-btn';
    if (isScored) {
      if (type === winner) return 'pick-btn correct-pick';
      if (type === myPick) return 'pick-btn wrong-pick';
      return 'pick-btn neutral-pick';
    }
    if (type === myPick) return `pick-btn sel-${type === 'draw' ? 'draw' : type === 'home' ? 'home' : 'away'}`;
    return 'pick-btn';
  };

  let bottomHTML = '';
  if (isScored && myPick) {
    const label = myPick === 'home' ? m.home.toUpperCase() + ' WIN' : myPick === 'away' ? m.away.toUpperCase() + ' WIN' : 'DRAW';
    bottomHTML = `<div class="result-pick-row ${correct ? 'correct' : 'wrong'}">${correct ? '✓' : '✗'} YOUR PICK · ${label}</div>`;
  } else if (!isScored) {
    if (userPicks[m.id]) {
      // pick already submitted — show locked state, no buttons
      const lockedLabel = userPicks[m.id] === 'home' ? m.home.toUpperCase() + ' WIN' : userPicks[m.id] === 'away' ? m.away.toUpperCase() + ' WIN' : 'DRAW';
      bottomHTML = `<div class="result-pick-row correct" style="opacity:0.7">🔒 PICK LOCKED · ${lockedLabel}</div>`;
    } else {
      bottomHTML = `<div class="picks-row">
        <button class="${pickBtnCls('home')}" onclick="pick(${m.id},'home')">${m.home.toUpperCase()} WIN</button>
        <button class="${pickBtnCls('draw')}" onclick="pick(${m.id},'draw')">DRAW</button>
        <button class="${pickBtnCls('away')}" onclick="pick(${m.id},'away')">${m.away.toUpperCase()} WIN</button>
      </div>`;
    }
  }

  const idx = DEMO_MATCH_IDS.indexOf(m.id);
  el.innerHTML = `<div class="slot-viewer ${phase === 'live' ? 'live-match-viewer' : correct ? 'won-card' : wrong ? 'lost-card' : ''}">
    <div class="match-top">
      <span class="match-stage-tag">${m.group} · ${m.stage}</span>
      ${idx >= 0 ? `<span style="font-family:'DM Mono',monospace;font-size:8px;letter-spacing:2px;color:rgba(255,255,255,0.2)">MATCH ${idx+1} / ${DEMO_MATCH_IDS.length}</span>` : ''}
      <span class="status-pill ${phase === 'live' ? 'live' : phase === 'scored' ? 'past' : 'open'}" style="margin-left:auto">
        ${phase === 'live' ? '⚡ LIVE' : phase === 'scored' ? 'FULL TIME' : 'OPEN'}
      </span>
    </div>
    ${phase === 'live' ? `<div class="live-timer-wrap">
      <div class="live-phase-label">MATCH IN PROGRESS</div>
      <div class="live-timer ${secondsLeft < 30 ? 'urgent' : ''}">${fmt(secondsLeft)}</div>
    </div>` : ''}
    <div class="teams-row" style="margin-bottom:0">
      <div class="team">${flagImg(m.home)}<div class="team-name">${m.home.toUpperCase()}</div></div>
      <div class="vs-block">
        ${isScored && scored ? `<div class="result-score">${scored.score}</div>` : `<div class="vs-text">VS</div>`}
      </div>
      <div class="team right"><div class="team-name">${m.away.toUpperCase()}</div>${flagImg(m.away)}</div>
    </div>
    <div style="margin-top:16px">${bottomHTML}</div>
  </div>`;
}

// ── Render upcoming queue ──────────────────────────────────────────────────
function renderQueue() {
  const el = document.getElementById('queue-section');
  const scoredIds = new Set((demoState.scored || []).map(s => s.matchId));
  const activeId  = demoState.matchId;

  const upcoming = DEMO_MATCH_IDS.filter(id => !scoredIds.has(id) && id !== activeId);
  if (!upcoming.length) { el.innerHTML = ''; return; }

  const items = upcoming.map(id => {
    const m = getMatch(id);
    if (!m) return '';
    return `<div class="queue-item">
      <div class="queue-group">${m.group} · ${m.stage}</div>
      <div class="queue-teams">${m.home.toUpperCase()} <span style="opacity:0.3;font-size:12px">VS</span> ${m.away.toUpperCase()}</div>
      ${flagImg(m.home)}${flagImg(m.away)}
    </div>`;
  }).join('');

  el.innerHTML = `<div class="section-label">UPCOMING</div>${items}`;
}

// ── Render past results ────────────────────────────────────────────────────
function renderHistory() {
  const el = document.getElementById('history-section');
  const scored = demoState.scored || [];
  if (!scored.length) { el.innerHTML = ''; return; }

  const items = [...scored].reverse().map(s => {
    const m = getMatch(s.matchId);
    if (!m) return '';
    const winner  = ['home','draw','away'][s.result];
    const myPick  = userPicks[s.matchId];
    const correct = myPick && myPick === winner;
    const wrong   = myPick && myPick !== winner;
    const cls     = !myPick ? 'no-pick' : correct ? 'correct' : 'wrong';
    const verdict = !myPick ? 'NO PICK' : correct ? '✓ CORRECT' : '✗ WRONG';
    return `<div class="history-item ${cls}">
      ${flagImg(m.home)}
      <div class="history-teams">${m.home.toUpperCase()}</div>
      <div class="history-score">${s.score}</div>
      <div class="history-teams" style="text-align:right">${m.away.toUpperCase()}</div>
      ${flagImg(m.away)}
      <div class="history-verdict">${verdict}</div>
    </div>`;
  }).join('');

  el.innerHTML = `<div class="section-label">RESULTS</div>${items}`;
}

// ── Main render ────────────────────────────────────────────────────────────
function render() {
  renderLive();
  renderQueue();
  renderHistory();
}

// ── Demo controls ──────────────────────────────────────────────────────────
const DEMO_SERVER = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
  ? 'http://localhost:3000'
  : 'https://glyph-demo-production.up.railway.app';

async function triggerDemo(action) {
  const addr = await GLYPH.getWallet();
  if (!addr && action === 'start') { alert('Connect your wallet first.'); return; }

  const btnStart = document.getElementById('btn-start');
  const btnStop  = document.getElementById('btn-stop');
  btnStart.disabled = true;
  btnStop.disabled  = true;

  try {
    const res = await fetch(`${DEMO_SERVER}/${action}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: action === 'start' ? JSON.stringify({ player: addr }) : '{}',
    });
    const data = await res.json();
    if (!data.ok) alert(data.message);
    // Instantly update pause state without waiting for next poll
    if (action === 'pause')  { _demoPaused = true; }
    if (action === 'resume') { _demoPaused = false; }
  } catch(e) {
    alert('Could not reach demo server');
  }

  syncDemoButtons();
}

async function syncDemoButtons() {
  try {
    const res  = await fetch(`${DEMO_SERVER}/status`);
    const { running, paused } = await res.json();
    _demoPaused = paused;
    document.getElementById('btn-start').disabled  = running;
    document.getElementById('btn-pause').disabled  = !running || paused;
    document.getElementById('btn-pause').style.display  = !paused ? 'inline-flex' : 'none';
    document.getElementById('btn-resume').disabled = !running || !paused;
    document.getElementById('btn-resume').style.display = paused  ? 'inline-flex' : 'none';
    document.getElementById('btn-stop').disabled   = !running;
  } catch {}
}

// ── Init ───────────────────────────────────────────────────────────────────
async function init() {
  const addr = await GLYPH.getWallet();
  _walletAddr = addr;

  if (addr) {
    // Load from localStorage immediately (no network wait)
    loadFromStorage();
    updateSubmitBar();

    document.getElementById('demo-controls').style.display = 'flex';
    syncDemoButtons();
    setInterval(syncDemoButtons, 1000);

    // Merge on-chain picks from subgraph (fills in anything missing from storage)
    try {
      const preds = await GLYPH.getMyPredictions(addr);
      preds.forEach(p => {
        userPicks[Number(p.matchId)] = ['home','draw','away'][Number(p.pick)];
        delete pending[Number(p.matchId)]; // confirmed on-chain, remove from pending
      });
      savePicks();
      savePending();
    } catch(_) {}
  }
  await pollState();
  setInterval(pollState, 2000);
}

init();
</script>
